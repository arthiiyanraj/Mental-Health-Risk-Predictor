<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Risk Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            padding: 40px;
            background: rgba(30, 41, 59, 0.95);
            animation: slideLeft 1s ease-in-out;
            overflow-y: auto;
        }

        @keyframes slideLeft {
            from {transform: translateX(-100px); opacity: 0;}
            to {transform: translateX(0); opacity: 1;}
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #22c55e;
        }

        /* INPUT BOX DESIGN */
        .input-box {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
            transition: 0.3s;
            border: 1px solid #334155;
        }

        input:focus, select:focus {
            border: 1px solid #22c55e;
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 3px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(34,197,94,0.3);
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            padding: 40px;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        /* RESULT CARD */
        .result-box {
            width: 85%;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            animation: pop 0.8s ease-in-out;
        }

        @keyframes pop {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        .low {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .medium {
            background: linear-gradient(135deg, #facc15, #f59e0b);
        }

        .high {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .suggestion {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        h3 {
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="main">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>🧠 Mental Health Predictor</h2>

        <form method="POST" action="/predict">

            <div class="input-box">
                <label>Age</label>
                <input name="Age" type="number" placeholder="Enter your age (e.g. 21)" required>
                <div class="hint">Your current age</div>
            </div>

            <div class="input-box">
                <label>Sleep Hours</label>
                <input name="Sleep_Hours" type="number" placeholder="e.g. 6 or 7 hours" required>
                <div class="hint">Recommended: 7–8 hours</div>
            </div>

            <div class="input-box">
                <label>Exercise Frequency</label>
                <input name="Exercise_Frequency" type="number" placeholder="Times per week" required>
                <div class="hint">Example: 3 times/week</div>
            </div>

            <div class="input-box">
                <label>Stress Level (1–10)</label>
                <input name="Stress_Level" type="number" placeholder="1 = low, 10 = high stress" required>
            </div>

            <div class="input-box">
                <label>Social Interaction</label>
                <input name="Social_Interaction" type="number" placeholder="People you interact weekly" required>
            </div>

            <div class="input-box">
                <label>Work Hours</label>
                <input name="Work_Hours" type="number" placeholder="Hours per day" required>
            </div>

            <div class="input-box">
                <label>Screen Time</label>
                <input name="Screen_Time" type="number" placeholder="Hours per day" required>
            </div>

            <div class="input-box">
                <label>Substance Use</label>
                <select name="Substance_Use">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="input-box">
                <label>Mental Illness History</label>
                <select name="Mental_Illness_History">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <button type="submit">Predict Risk 🚀</button>

        </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        {% if prediction %}
        <div class="result-box 
            {% if prediction == 'Low Risk' %}low
            {% elif prediction == 'Medium Risk' %}medium
            {% else %}high
            {% endif %}
        ">
            <h2>Prediction Result</h2>
            <h3>{{ prediction }}</h3>

            <div class="suggestion">
                <b>Suggestions:</b><br><br>
                {{ suggestion|safe }}
            </div>
        </div>

        {% else %}
        <div style="text-align:center;">
            <h2>🧠 Your Result Will Appear Here</h2>
            <p>Fill the form and click Predict</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
